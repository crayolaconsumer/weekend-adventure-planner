<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    ROAM+ Annual — promotional image for App Store Connect IAP.
    Dark / forest palette as the visual counter-balance to the cream
    Monthly tier. Concentric gold rings hint at the "annual" duration
    (rings = year). Sun-burst lines convey premium / loyalty feel
    without leaning on the compass mark used in the app icon.
    Deliberately abstract: no pricing or trial copy.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#234b3d"/>
      <stop offset="100%" stop-color="#0d1b16"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d488"/>
      <stop offset="50%" stop-color="#d4a855"/>
      <stop offset="100%" stop-color="#a87832"/>
    </linearGradient>
  </defs>

  <!-- Forest background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Sun-burst rays radiating from centre -->
  <g transform="translate(512, 512)" opacity="0.18">
    <g fill="#d4a855">
      <polygon points="0,-460 12,-100 -12,-100"/>
      <polygon points="0,460 12,100 -12,100"/>
      <polygon points="460,0 100,12 100,-12"/>
      <polygon points="-460,0 -100,12 -100,-12"/>
      <g transform="rotate(45)"><polygon points="0,-460 12,-100 -12,-100"/></g>
      <g transform="rotate(135)"><polygon points="0,-460 12,-100 -12,-100"/></g>
      <g transform="rotate(225)"><polygon points="0,-460 12,-100 -12,-100"/></g>
      <g transform="rotate(315)"><polygon points="0,-460 12,-100 -12,-100"/></g>
    </g>
  </g>

  <!-- Concentric gold rings — twelve rings echo twelve months of the
       year, the visual subject of an annual subscription. Slight stroke
       variation gives them depth without being busy. -->
  <g transform="translate(512, 512)" fill="none" stroke="url(#gold)" stroke-opacity="0.75">
    <circle r="380" stroke-width="2"/>
    <circle r="350" stroke-width="1.2"/>
    <circle r="320" stroke-width="1.2"/>
    <circle r="290" stroke-width="1.2"/>
    <circle r="260" stroke-width="2"/>
  </g>

  <!-- Gold central disc behind the wordmark -->
  <circle cx="512" cy="512" r="230" fill="#1a3a2f" stroke="url(#gold)" stroke-width="4"/>

  <!-- Tier label, top of disc -->
  <text x="512" y="430"
        font-family="-apple-system, 'Helvetica Neue', sans-serif"
        font-size="34" font-weight="500"
        letter-spacing="16"
        text-anchor="middle" fill="#d4a855">
    ANNUAL
  </text>

  <!-- Gold rule under tier label -->
  <line x1="430" y1="455" x2="594" y2="455" stroke="#d4a855" stroke-width="2"/>

  <!-- Wordmark — large cream -->
  <text x="512" y="565"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="120" font-weight="400"
        text-anchor="middle" fill="#fdfcf8"
        letter-spacing="-4">
    ROAM
  </text>

  <!-- + glyph in gold -->
  <text x="512" y="660"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="80" font-weight="300"
        text-anchor="middle" fill="url(#gold)">
    +
  </text>

  <!-- Tagline below the disc -->
  <text x="512" y="850"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32" font-style="italic"
        text-anchor="middle" fill="#d4a855" opacity="0.9">
    A full year of weekend escapes
  </text>
</svg>

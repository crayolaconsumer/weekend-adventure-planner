<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- maximum-scale + user-scalable=no disables pinch-zoom of the page itself.
       Without this, accidental two-finger pinches in iOS WKWebView zoom the
       chrome out of place (and recovery is awkward). Inner content that wants
       its own zoom (maps, photo viewers) handles it via gestures inside its
       own component. Web a11y trade-off accepted because native apps don't
       expose page-zoom either — system Display Zoom + Dynamic Type still work. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Theme bootstrap — runs synchronously before any CSS or React loads.
       Apply the user's saved theme preference (or follow the OS) BEFORE
       first paint, so the page never flashes light-mode while the dark
       preference is being read. The script is intentionally tiny and
       inline so it doesn't add a render-blocking request. -->
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('roam_theme') || 'system'
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var dark = pref === 'dark' || (pref === 'system' && systemDark)
        if (dark) document.documentElement.setAttribute('data-theme', 'dark')
        // Update the iOS Safari address-bar color too so the browser
        // chrome matches the theme on first load.
        var themeColor = dark ? '#0d1b16' : '#1a3a2f'
        var meta = document.querySelector('meta[name="theme-color"]')
        if (meta) meta.setAttribute('content', themeColor)
      } catch (e) { /* localStorage unavailable — ship light mode */ }
    })()
  </script>

  <!-- Primary Meta Tags -->
  <title>ROAM — Stop scrolling. Start roaming.</title>
  <meta name="title" content="ROAM — Stop scrolling. Start roaming." />
  <meta name="description"
    content="Beat boredom with one tap. Swipe through curated local places, build spontaneous adventures, and get out there exploring." />
  <meta name="theme-color" content="#1a3a2f" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.go-roam.uk/" />
  <meta property="og:title" content="ROAM — Stop scrolling. Start roaming." />
  <meta property="og:description"
    content="Beat boredom with one tap. Swipe through curated local places, build spontaneous adventures, and get out there exploring." />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://www.go-roam.uk/" />
  <meta property="twitter:title" content="ROAM — Stop scrolling. Start roaming." />
  <meta property="twitter:description"
    content="Beat boredom with one tap. Swipe through curated local places, build spontaneous adventures, and get out there exploring." />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>" />

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ROAM" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Service Worker Registration with Update Handling -->
  <script>
    const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
    // Skip SW registration in Capacitor (iOS WKWebView's SW support is
    // limited; the offline pack feature uses @capacitor/filesystem on
    // native instead — wired in Stage 4)
    const isCapacitor = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())
    if (!isLocalhost && !isCapacitor && 'serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered:', registration.scope)

            // Check for updates periodically (every 60 minutes)
            setInterval(() => registration.update(), 60 * 60 * 1000)

            // Handle updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing
              if (!newWorker) return

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available - dispatch event for React to show toast
                  window.dispatchEvent(new CustomEvent('swUpdate', { detail: { registration } }))
                }
              })
            })
          })
          .catch((error) => {
            console.log('SW registration failed:', error)
          })
      })

      // Listen for controller change (SW took over) and reload
      let refreshing = false
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true
          window.location.reload()
        }
      })
    }

    // Global function to apply SW update (called from React)
    window.applySwUpdate = function(registration) {
      if (registration?.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' })
      }
    }
  </script>
</body>

</html>
